<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Forever 🎵</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&family=Caveat:ital@1&display=swap');

        :root {
            --bg-hue: 340;
            --bg-deep: hsl(var(--bg-hue), 60%, 4%);
            --bg-light: hsl(var(--bg-hue), 50%, 15%);
            
            --text-main: #ffffff;
            --text-muted: #e0bfb8;
            --accent: #ff758c;
            --accent-glow: rgba(255, 117, 140, 0.6);
            --rosegold: #b76e79;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 20%, var(--bg-light) 0%, var(--bg-deep) 80%);
            width: 100vw;
            min-height: 100vh;
            min-height: 100dvh; /* Forces fill on tall Android screens */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: var(--text-main);
            transition: background-color 0.5s ease, background-image 0.5s ease;
            touch-action: none;
        }

        #particle-canvas, #visualizer-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100dvh;
            z-index: 1; pointer-events: none;
        }
        #visualizer-canvas { z-index: 3; opacity: 0.6; filter: drop-shadow(0 0 10px var(--accent)); }

        #phone-container {
            width: 100%; max-width: 480px; 
            height: 100%; min-height: 100dvh; 
            position: relative; display: flex; flex-direction: column; 
            justify-content: space-between; /* Spreads elements naturally on tall screens */
            padding: clamp(30px, 6vh, 60px) 25px; 
            z-index: 10;
        }

        .header {
            text-align: center; font-size: 0.85rem; font-weight: 500;
            color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase;
            animation: fadeIn 2s ease; margin-bottom: 2vh;
        }

        /* --- 3D RECORD PLAYER --- */
        .album-art-container {
            width: 100%; 
            max-width: clamp(250px, 40vh, 360px); 
            aspect-ratio: 1/1;
            margin: 0 auto;
            position: relative;
            perspective: 1000px;
        }

        .vinyl-flipper {
            width: 85%; height: 85%; margin: 0 auto;
            position: relative; top: 7.5%;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 5; cursor: grab; touch-action: none;
        }
        .vinyl-flipper:active { cursor: grabbing; }

        .vinyl-front, .vinyl-back {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(#111, #222, #111, #333, #111, #222, #111);
            border: 2px solid #050505;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px #000;
            display: flex; justify-content: center; align-items: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        
        .vinyl-front { transform: rotateY(0deg); }
        .vinyl-back { 
            transform: rotateY(180deg); 
            background: conic-gradient(#1a1a1a, #2a2a2a, #1a1a1a, #3a3a3a, #1a1a1a);
        }

        .vinyl-front::before, .vinyl-back::before {
            content: ''; position: absolute; width: 90%; height: 90%; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05); pointer-events: none;
        }
        .vinyl-front::after, .vinyl-back::after {
            content: ''; position: absolute; width: 70%; height: 70%; border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.08); pointer-events: none;
        }

        .vinyl-label {
            width: 35%; height: 35%; border-radius: 50%;
            background: linear-gradient(135deg, var(--rosegold) 0%, var(--accent) 100%);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.8); z-index: 2; border: 2px solid #111;
            pointer-events: none;
        }
        .vinyl-label-inner { font-size: clamp(1.2rem, 5vw, 2rem); filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        .b-side-note {
            width: 55%; height: 55%; border-radius: 50%;
            background: #f4ecd8;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); z-index: 2; border: 1px solid #111;
        }
        .b-side-text {
            font-family: 'Caveat', cursive; font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: #2b2b2b; font-weight: bold; line-height: 1.2; transform: rotate(-10deg);
        }

        .flip-btn {
            position: absolute; top: -10px; right: -10px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); font-size: 0.7rem; letter-spacing: 2px;
            padding: 8px 15px; border-radius: 20px; text-transform: uppercase;
            cursor: pointer; z-index: 20; backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); transition: background 0.3s;
        }
        .flip-btn:active { background: rgba(255,255,255,0.3); }

        .stylus-arm {
            position: absolute; top: -10%; right: -5%; 
            width: clamp(30px, 8vw, 40px); height: clamp(120px, 35vh, 160px);
            transform-origin: top center; transform: rotate(-25deg);
            transition: transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10; pointer-events: none; filter: drop-shadow( -10px 20px 10px rgba(0,0,0,0.6) );
        }
        .album-art-container.playing .stylus-arm { transform: rotate(22deg); }
        
        .stylus-base {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 30px; height: 30px; border-radius: 50%;
            background: radial-gradient(circle, #ddd 0%, #777 100%); border: 2px solid #222;
        }
        .stylus-rod {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 75%; background: linear-gradient(90deg, #999 0%, #fff 50%, #666 100%); border-radius: 3px;
        }
        .stylus-head {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 15px; height: 25px; border-radius: 3px; background: #222; border-top: 2px solid var(--rosegold);
        }

        /* --- FROSTED GLASS UI WRAPPER --- */
        .player-ui {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; 
            padding: clamp(20px, 4vh, 30px) 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; flex: 1; min-height: 0;
            z-index: 15; margin-top: 3vh;
        }

        .track-info { text-align: center; margin-bottom: clamp(15px, 3vh, 25px); pointer-events: none; }
        .track-title { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 5vw, 1.8rem); font-weight: 600; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .track-artist { font-size: 0.85rem; color: var(--accent); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }

        .progress-container { margin-bottom: clamp(15px, 3vh, 20px); pointer-events: none; }
        .progress-bar-bg {
            width: 100%; height: 5px; background-color: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; position: relative;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--rosegold), var(--accent));
            border-radius: 10px; transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .time-info {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex; justify-content: center; align-items: center; 
            gap: clamp(20px, 6vw, 35px); 
            margin-bottom: clamp(10px, 2vh, 20px);
        }
        .ctrl-btn { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; justify-content: center; align-items: center; padding: 5px; }
        
        .play-btn {
            width: clamp(55px, 15vw, 65px); height: clamp(55px, 15vw, 65px); border-radius: 50%;
            background: linear-gradient(135deg, var(--rosegold) 0%, var(--accent) 100%);
            color: #fff; box-shadow: 0 10px 25px var(--accent-glow);
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease;
        }
        .play-btn:active { transform: scale(0.9); box-shadow: 0 5px 15px var(--accent-glow); }
        .play-btn svg { width: clamp(22px, 6vw, 28px); height: clamp(22px, 6vw, 28px); fill: currentColor; }
        .side-btn svg { width: clamp(18px, 5vw, 22px); height: clamp(18px, 5vw, 22px); fill: currentColor; opacity: 0.6; transition: opacity 0.2s; }
        .side-btn:active svg { opacity: 1; }

        .lyrics-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; pointer-events: none; min-height: 40px;
        }
        .lyric-text {
            font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 4vw, 1.3rem); line-height: 1.4;
            color: var(--text-main); font-style: italic; text-align: center;
            position: absolute; width: 100%;
            opacity: 0; filter: blur(5px); transform: translateY(10px);
            transition: opacity 1s ease, filter 1s ease, transform 1s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }
        .lyric-text.active { opacity: 1; filter: blur(0px); transform: translateY(0); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bg-audio" src="song.MP3" preload="auto"></audio>

    <canvas id="particle-canvas"></canvas>
    
    <div id="phone-container">
        <div class="header">It's Honeybun's Birthday</div>

        <div class="album-art-container" id="art-container">
            <canvas id="visualizer-canvas"></canvas>
            
            <button class="flip-btn" id="flip-btn">Flip B-Side</button>
            
            <div class="vinyl-flipper" id="vinyl-flipper">
                <div class="vinyl-front">
                    <div class="vinyl-label"><div class="vinyl-label-inner">❤️</div></div>
                </div>
                <div class="vinyl-back">
                    <div class="b-side-note">
                        <div class="b-side-text">A love that transcends time and code.<br><br>Yours forever.</div>
                    </div>
                </div>
            </div>

            <div class="stylus-arm">
                <div class="stylus-base"></div>
                <div class="stylus-rod"></div>
                <div class="stylus-head"></div>
            </div>
        </div>

        <div class="player-ui">
            <div class="track-info">
                <div class="track-title" id="song-title">Reasons Why I Love You</div>
                <div class="track-artist">Your Pookie</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn side-btn" id="rewind-btn">
                    <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                </button>
                
                <button class="ctrl-btn play-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                
                <button class="ctrl-btn side-btn" id="forward-btn">
                    <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </button>
            </div>

            <div class="lyrics-container" id="lyrics-box"></div>
        </div>
    </div>

    <script>
        // --- 1. CORE SETUP & LYRICS ---
        // Reference the hardcoded HTML element to bypass Android blocking
        const audio = document.getElementById('bg-audio');

        const lyricsData = [
            { time: 0, text: "Tap play... 🎵\n(Or drag the vinyl to scrub)" },
            { time: 3, text: "" },
            { time: 6, text: " ✨" },
            { time: 10, text: "" },
            { time: 15, text: "." },
            { time: 20, text: " ❤️" },
            { time: 25, text: "Every day with you is beautiful." },
            { time: 30, text: "Thangoo, Ammu." },
            { time: 35, text: "I love you always, Honeybun. 🌙" }
        ];

        // DOM Elements
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const vinylFlipper = document.getElementById('vinyl-flipper');
        const artContainer = document.getElementById('art-container');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const lyricsBox = document.getElementById('lyrics-box');
        const flipBtn = document.getElementById('flip-btn');

        let currentLyricIndex = -1;

        // Inject lyrics
        lyricsData.forEach((lyric, index) => {
            const p = document.createElement('p');
            p.className = 'lyric-text';
            p.id = `lyric-${index}`;
            p.innerText = lyric.text;
            lyricsBox.appendChild(p);
        });
        updateLyrics(0);

        // --- 2. OPTIMIZED ALGORITHMIC VISUALIZER ---
        const visCanvas = document.getElementById('visualizer-canvas');
        const visCtx = visCanvas.getContext('2d');
        let isVisualizerRunning = false;
        let visCx, visCy, visRadius;

        function resizeVisualizer() {
            visCanvas.width = window.innerWidth;
            visCanvas.height = window.innerHeight;
            const artRect = artContainer.getBoundingClientRect();
            visCx = visCanvas.width / 2;
            visCy = artRect.top + artRect.height / 2;
            visRadius = (artRect.width / 2) * 0.95; 
        }
        window.addEventListener('resize', resizeVisualizer);
        setTimeout(resizeVisualizer, 100);

        function drawVisualizer() {
            if (!isVisualizerRunning) return;
            requestAnimationFrame(drawVisualizer);
            
            if (audio.paused) {
                visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);
                return;
            }

            visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);
            
            const barCount = 48; 
            const angleStep = (Math.PI * 2) / barCount;

            visCtx.lineWidth = 4;
            visCtx.lineCap = "round";

            const time = Date.now() / 1000; 
            const beat = Math.pow(Math.sin(time * Math.PI * 1.5), 4); 

            for (let i = 0; i < barCount; i++) {
                const wave1 = Math.sin(i * 0.4 + time * 3) * 0.4;
                const wave2 = Math.cos(i * 0.2 - time * 2) * 0.3;
                const noise = Math.random() * 0.2;
                
                let percent = (beat * 0.5) + Math.abs(wave1) + Math.abs(wave2) + noise;
                if(percent > 1) percent = 1;

                const barHeight = percent * (visRadius * 0.25); 

                const angle = i * angleStep;
                const x1 = visCx + Math.cos(angle) * visRadius;
                const y1 = visCy + Math.sin(angle) * visRadius;
                const x2 = visCx + Math.cos(angle) * (visRadius + barHeight);
                const y2 = visCy + Math.sin(angle) * (visRadius + barHeight);

                visCtx.strokeStyle = `rgba(255, 117, 140, ${percent * 0.8 + 0.2})`;
                visCtx.beginPath();
                visCtx.moveTo(x1, y1);
                visCtx.lineTo(x2, y2);
                visCtx.stroke();
            }
        }

        // --- 3. DYNAMIC STAGE LIGHTING ---
        function updateLighting(progressPercent) {
            let hue = 340;
            if (progressPercent < 50) {
                hue = 340 + (progressPercent / 50) * 15;
            } else {
                hue = 355 - ((progressPercent - 50) / 50) * 115;
            }
            document.documentElement.style.setProperty('--bg-hue', hue);
        }

        // --- 4. TACTILE VINYL SCRUBBING ---
        let currentRotation = 0;
        let isScrubbing = false;
        let lastAngle = 0;

        function getAngle(e) {
            const rect = vinylFlipper.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            return Math.atan2(y - cy, x - cx) * (180 / Math.PI);
        }

        vinylFlipper.addEventListener('mousedown', startScrub);
        vinylFlipper.addEventListener('touchstart', startScrub, {passive: false});
        window.addEventListener('mousemove', scrub);
        window.addEventListener('touchmove', scrub, {passive: false});
        window.addEventListener('mouseup', endScrub);
        window.addEventListener('touchend', endScrub);
        window.addEventListener('touchcancel', endScrub); 

        function startScrub(e) {
            isScrubbing = true;
            lastAngle = getAngle(e);
            vinylFlipper.style.transition = 'none'; 
            if(navigator.vibrate) navigator.vibrate(10);
        }

        function scrub(e) {
            if (!isScrubbing) return;
            e.preventDefault(); 
            
            const newAngle = getAngle(e);
            let delta = newAngle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;

            currentRotation += delta;
            vinylFlipper.style.transform = `rotateY(${isFlipped ? 180 : 0}deg) rotateZ(${currentRotation}deg)`;
            lastAngle = newAngle;

            if (audio.duration) {
                let newTime = audio.currentTime + (delta * 0.1);
                if (newTime < 0) newTime = 0;
                if (newTime > audio.duration) newTime = audio.duration;
                audio.currentTime = newTime;
                
                if (Math.abs(delta) > 2 && navigator.vibrate) navigator.vibrate(5);
            }
        }

        function endScrub() {
            if(!isScrubbing) return;
            isScrubbing = false;
            vinylFlipper.style.transition = 'transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1)';
        }

        setInterval(() => {
            if (!audio.paused && !isScrubbing) {
                currentRotation += 0.5; 
                vinylFlipper.style.transform = `rotateY(${isFlipped ? 180 : 0}deg) rotateZ(${currentRotation}deg)`;
            }
        }, 16);

        // --- 5. B-SIDE 3D FLIP ---
        let isFlipped = false;
        flipBtn.addEventListener('click', () => {
            isFlipped = !isFlipped;
            if(navigator.vibrate) navigator.vibrate([20, 50, 20]);
            vinylFlipper.style.transform = `rotateY(${isFlipped ? 180 : 0}deg) rotateZ(${currentRotation}deg)`;
            flipBtn.innerText = isFlipped ? "Flip A-Side" : "Flip B-Side";
        });

        // --- 6. AUDIO LOGIC & CONTROLS ---
        audio.addEventListener('loadedmetadata', () => { totalTimeEl.innerText = formatTime(audio.duration); });

        playPauseBtn.addEventListener('click', () => {
            if(navigator.vibrate) navigator.vibrate(15);

            if (audio.paused) {
                // Ensure audio is loaded properly on Android before playing
                if (audio.readyState === 0) audio.load();
                
                audio.play().then(() => {
                    playIcon.style.display = 'none'; 
                    pauseIcon.style.display = 'block';
                    artContainer.classList.add('playing');
                    
                    if (!isVisualizerRunning) {
                        isVisualizerRunning = true;
                        resizeVisualizer(); 
                        drawVisualizer();
                    }
                }).catch(err => {
                    console.error("Playback prevented.", err);
                    // Fallback trigger if Android blocked the Promise
                    audio.load();
                    audio.play();
                });
            } else {
                audio.pause();
                playIcon.style.display = 'block'; 
                pauseIcon.style.display = 'none';
                artContainer.classList.remove('playing');
            }
        });

        document.getElementById('forward-btn').addEventListener('click', () => { audio.currentTime += 5; if(navigator.vibrate) navigator.vibrate(10); });
        document.getElementById('rewind-btn').addEventListener('click', () => { audio.currentTime -= 5; if(navigator.vibrate) navigator.vibrate(10); });

        audio.addEventListener('timeupdate', () => {
            let progressPercent = 0;
            if (audio.duration) {
                progressPercent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${progressPercent}%`;
                updateLighting(progressPercent);
            }
            currentTimeEl.innerText = formatTime(audio.currentTime);
            updateLyrics(audio.currentTime);
        });

        audio.addEventListener('ended', () => {
            playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
            artContainer.classList.remove('playing');
            progressFill.style.width = `0%`; currentTimeEl.innerText = "0:00";
            updateLyrics(0); updateLighting(0);
        });

        function updateLyrics(time) {
            let newLyricIndex = -1;
            for (let i = lyricsData.length - 1; i >= 0; i--) {
                if (time >= lyricsData[i].time) {
                    newLyricIndex = i;
                    break;
                }
            }
            if (newLyricIndex !== currentLyricIndex && newLyricIndex !== -1) {
                if (currentLyricIndex !== -1) document.getElementById(`lyric-${currentLyricIndex}`).classList.remove('active');
                document.getElementById(`lyric-${newLyricIndex}`).classList.add('active');
                currentLyricIndex = newLyricIndex;
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // --- 7. AMBIENT PARTICLES (Stardust & Hearts) ---
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let pWidth, pHeight, bParticles = [];

        function initPCanvas() {
            pWidth = pCanvas.width = window.innerWidth;
            pHeight = pCanvas.height = window.innerHeight;
            bParticles = [];
            for (let i = 0; i < 30; i++) {
                bParticles.push({
                    x: Math.random() * pWidth, y: Math.random() * pHeight,
                    r: Math.random() * 1.5 + 0.5, speed: Math.random() * 0.3 + 0.1,
                    alpha: Math.random() * 0.5 + 0.1, isHeart: Math.random() > 0.8
                });
            }
        }
        window.addEventListener('resize', initPCanvas);
        
        function drawPHeart(ctx, x, y, size, alpha) {
            ctx.save(); ctx.translate(x, y); ctx.scale(size, size);
            ctx.globalAlpha = alpha; ctx.fillStyle = '#ff758c';
            ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(0, -1.5, 2.5, -1.5, 2.5, 0); ctx.bezierCurveTo(2.5, 1.5, 0, 3, 0, 3);
            ctx.bezierCurveTo(0, 3, -2.5, 1.5, -2.5, 0); ctx.bezierCurveTo(-2.5, -1.5, 0, -1.5, 0, 0);
            ctx.fill(); ctx.restore();
        }

        function animatePParticles() {
            pCtx.clearRect(0, 0, pWidth, pHeight);
            const speedMultiplier = !audio.paused ? 2 : 0.5;

            bParticles.forEach(p => {
                p.y -= p.speed * speedMultiplier;
                p.x += Math.sin(p.y * 0.05) * 0.2; 
                
                if (p.y < -10) { p.y = pHeight + 10; p.x = Math.random() * pWidth; }
                
                if (p.isHeart) { drawPHeart(pCtx, p.x, p.y, p.r, p.alpha); } 
                else { pCtx.beginPath(); pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2); pCtx.fillStyle = `rgba(224, 191, 184, ${p.alpha})`; pCtx.fill(); }
            });
            requestAnimationFrame(animatePParticles);
        }
        initPCanvas(); animatePParticles();
    </script>
</body>
</html>
