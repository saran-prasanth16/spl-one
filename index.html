<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 14 ✨</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --bg-deep: #050203;
            --bg-light: #16070a;
            --rosegold-light: #e0bfb8;
            --rosegold-main: #b76e79;
            --rosegold-dark: #63333d;
            --text-light: #f3e5e5;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; touch-action: none;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-light) 0%, var(--bg-deep) 100%);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100dvh; width: 100vw;
            position: fixed; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- AMBIENT DUST --- */
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100dvh;
            z-index: 1; pointer-events: none;
        }

        /* --- UI HEADERS --- */
        .instruction-overlay {
            position: absolute; top: 10%; width: 100%;
            text-align: center; z-index: 5;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem); 
            color: var(--rosegold-light); font-style: italic;
            text-shadow: 0 0 15px rgba(183, 110, 121, 0.6);
            pointer-events: none; transition: opacity 1s ease;
            padding: 0 20px; line-height: 1.3;
        }

        .sub-instruction {
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            letter-spacing: 4px; text-transform: uppercase; color: var(--rosegold-main);
            margin-top: 15px; font-weight: 400; font-style: normal;
            animation: pulseHint 2s infinite alternate;
        }

        /* --- THE HOURGLASS MECHANICS --- */
        #hourglass-container {
            position: relative;
            width: 120px; height: 260px;
            z-index: 20; margin-top: 5vh;
            cursor: grab;
            transition: transform 1s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.5s ease;
            transform-origin: center center;
        }
        #hourglass-container:active { cursor: grabbing; }

        /* The SVG Glass Frame */
        .glass-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            fill: rgba(255,255,255,0.02);
            stroke: rgba(224, 191, 184, 0.5); stroke-width: 2;
            filter: drop-shadow(0 0 10px rgba(183, 110, 121, 0.2));
            pointer-events: none; z-index: 10;
        }

        /* The Chambers */
        .chamber {
            position: absolute; width: 120px; height: 130px; left: 0;
            overflow: hidden; z-index: 5;
        }
        .chamber-a { top: 0; clip-path: polygon(10% 0, 90% 0, 55% 100%, 45% 100%); }
        .chamber-b { bottom: 0; clip-path: polygon(45% 0, 55% 0, 90% 100%, 10% 100%); }

        /* The Sand Physics */
        .sand-fill {
            position: absolute; width: 100%;
            background: linear-gradient(to bottom, var(--rosegold-light) 0%, var(--rosegold-main) 100%);
            box-shadow: 0 0 20px var(--rosegold-main);
            /* Height is managed by JS */
        }

        /* Initial State: Upright. Chamber A (Top) is empty. Chamber B (Bottom) is full. */
        #hourglass-container:not(.inverted) .chamber-a .sand-fill { bottom: 0; height: 0%; }
        #hourglass-container:not(.inverted) .chamber-b .sand-fill { bottom: 0; height: 100%; }

        /* Inverted State: Hourglass is rotated 180deg. Chamber A is visually at bottom. Chamber B is visually at top. */
        #hourglass-container.inverted .chamber-a .sand-fill { top: 0; }
        #hourglass-container.inverted .chamber-b .sand-fill { top: 0; }

        /* The Sand Stream */
        #sand-stream {
            position: absolute; width: 2px; height: 0;
            top: 130px; left: 59px;
            background: var(--rosegold-light);
            box-shadow: 0 0 8px var(--rosegold-main);
            z-index: 8; opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Supernova Flash Overlay */
        #supernova-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: #fff; opacity: 0; pointer-events: none; z-index: 60;
        }

        /* --- FINAL REVEAL CARD --- */
        #final-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 70;
            transition: opacity 2s ease 0.5s; 
        }
        #final-screen.active { opacity: 1; pointer-events: all; }

        .reveal-card {
            background: linear-gradient(180deg, rgba(20, 10, 12, 0.85) 0%, rgba(10, 5, 6, 0.95) 100%);
            border: 1px solid rgba(183, 110, 121, 0.3); border-radius: 24px;
            padding: clamp(30px, 8vw, 50px) clamp(20px, 6vw, 30px);
            text-align: center; width: 88%; max-width: 420px;
            max-height: 85dvh; overflow-y: auto; scrollbar-width: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(183, 110, 121, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transform: scale(0.9) translateY(20px); transition: transform 2s cubic-bezier(0.25, 0.8, 0.25, 1) 0.5s;
        }
        .reveal-card::-webkit-scrollbar { display: none; }
        #final-screen.active .reveal-card { transform: scale(1) translateY(0); }

        .reveal-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 8vw, 3rem); color: var(--rosegold-light); font-style: italic; margin-bottom: 15px; }
        .reveal-body { font-size: clamp(0.95rem, 4vw, 1.1rem); color: #d8c8cb; line-height: 1.8; font-weight: 300; margin-bottom: 30px; white-space: pre-line; }
        .reveal-footer { font-size: 0.75rem; letter-spacing: 4px; color: var(--rosegold-main); text-transform: uppercase; font-weight: 600; }

        /* KEYFRAMES */
        @keyframes pulseHint { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div id="supernova-overlay"></div>

    <div class="instruction-overlay" id="instruction-text">
        The waiting is almost over.
        <div class="sub-instruction" id="hint-text">Swipe up to flip the glass</div>
    </div>

    <div id="hourglass-container">
        <svg class="glass-frame" viewBox="0 0 120 260">
            <path d="M10,5 L110,5 C110,5 100,100 65,130 L55,130 C20,100 10,5 10,5 Z" />
            <path d="M55,130 L65,130 C100,160 110,255 110,255 L10,255 C10,255 20,160 55,130 Z" />
        </svg>

        <div class="chamber chamber-a">
            <div class="sand-fill" id="sand-a"></div>
        </div>
        <div class="chamber chamber-b">
            <div class="sand-fill" id="sand-b"></div>
        </div>
        
        <div id="sand-stream"></div>
    </div>

    <div id="final-screen">
        <div class="reveal-card">
            <h1 class="reveal-title">Almost There</h1>
            <div style="width: 40px; height: 1px; background: var(--rosegold-main); margin: 0 auto 20px auto;"></div>
            <p class="reveal-body">
                I’ve been counting down the days, the hours, and every grain of sand until tomorrow. 
                
                The wait is finally over. Get ready to celebrate. 
                
                Just one more sleep, Ammu.
            </p>
            <div class="reveal-footer">Day 14 Unlocked ✨</div>
        </div>
    </div>

    <script>
        // --- 1. AMBIENT PARTICLES ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 1.5, alpha: Math.random(),
                    v: Math.random() * 0.3 + 0.1, pulsate: Math.random() * 0.02 + 0.01,
                    isExploding: false, vx: 0, vy: 0
                });
            }
        }
        window.addEventListener('resize', initCanvas);

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                if (p.isExploding) {
                    p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.95; p.vy *= 0.95; // Friction
                } else {
                    p.y -= p.v;
                    if (p.y < -10) { p.y = height + 10; p.x = Math.random() * width; }
                }
                
                p.alpha += p.pulsate;
                if (p.alpha >= 0.8 || p.alpha <= 0.1) p.pulsate *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(224, 191, 184, ${p.alpha})`; 
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        initCanvas(); animateParticles();

        // --- 2. HOURGLASS FLIP LOGIC ---
        const hgContainer = document.getElementById('hourglass-container');
        const sandA = document.getElementById('sand-a');
        const sandB = document.getElementById('sand-b');
        const stream = document.getElementById('sand-stream');
        const instructionText = document.getElementById('instruction-text');
        
        let isFlipped = false;
        let isFinished = false;
        let startY = 0;
        let sandLevel = 100; // 100 means Chamber B is full, A is empty
        let pourInterval;

        function getCoords(e) {
            return e.touches ? e.touches[0].clientY : e.clientY;
        }

        hgContainer.addEventListener('mousedown', handleStart);
        hgContainer.addEventListener('touchstart', handleStart, {passive: false});

        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        function handleStart(e) {
            if (isFlipped || isFinished) return;
            startY = getCoords(e);
            if(navigator.vibrate) navigator.vibrate(10);
        }

        function handleEnd(e) {
            if (isFlipped || isFinished || startY === 0) return;
            
            let endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            let dy = endY - startY;

            // If user swiped UP aggressively (dy is negative)
            if (dy < -40) {
                flipHourglass();
            }
            startY = 0; // Reset
        }

        function flipHourglass() {
            isFlipped = true;
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]); // Heavy clunk

            // Rotate the physical container
            hgContainer.style.transform = 'rotate(180deg)';
            
            // Wait for rotation animation to almost finish before starting pour
            setTimeout(() => {
                hgContainer.classList.add('inverted');
                instructionText.style.opacity = '0';
                startPouring();
            }, 800);
        }

        // --- 3. POURING PHYSICS ---
        function startPouring() {
            stream.style.opacity = '1';
            stream.style.height = '120px'; // Reaches the bottom
            
            // Continuous soft haptic hum while pouring
            let hapticInterval = setInterval(() => {
                if(navigator.vibrate) navigator.vibrate(10);
            }, 150);

            pourInterval = setInterval(() => {
                sandLevel -= 0.5; // Controls pour speed
                
                // Because of .inverted class, B is visually on top, A is visually on bottom
                sandB.style.height = `${sandLevel}%`; 
                sandA.style.height = `${100 - sandLevel}%`;

                if (sandLevel <= 0) {
                    clearInterval(pourInterval);
                    clearInterval(hapticInterval);
                    triggerShatter();
                }
            }, 30); // 30ms frames
        }

        // --- 4. FINALE SHATTER SEQUENCE ---
        function triggerShatter() {
            isFinished = true;
            stream.style.opacity = '0';
            
            if(navigator.vibrate) navigator.vibrate([100, 50, 300]); // Shatter vibration
            
            // Hide hourglass
            hgContainer.style.opacity = '0';
            setTimeout(() => hgContainer.style.display = 'none', 500);

            // Turn existing particles into an explosion
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            particles.forEach(p => {
                p.x = cx; p.y = cy;
                p.isExploding = true;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 20 + 5;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.r = Math.random() * 4 + 2; // Make shards bigger
            });

            // Flash the screen
            const overlay = document.getElementById('supernova-overlay');
            overlay.style.transition = 'opacity 0.2s ease-in';
            overlay.style.opacity = '1';

            setTimeout(() => {
                // Show Letter
                document.getElementById('final-screen').classList.add('active');
                
                // Fade out flash
                overlay.style.transition = 'opacity 1.5s ease-out';
                overlay.style.opacity = '0';
            }, 400);
        }
    </script>
</body>
</html>
