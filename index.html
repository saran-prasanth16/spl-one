<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#03040b">
    <title>For You</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }

        body, html {
            width: 100vw; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, #010205 0%, #060814 60%, #0a0d1f 100%);
            color: #e0e0e0; font-family: 'Montserrat', sans-serif;
            overflow: hidden; touch-action: none; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- THE STARRY SKY (Canvas) --- */
        #star-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            z-index: 0; pointer-events: none;
        }

        /* --- THE CONSTELLATION OVERLAY --- */
        #constellation-container {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; max-width: 400px; height: 300px;
            z-index: 5; pointer-events: none; opacity: 0;
            transition: opacity 3s ease 1s; 
        }
        body.released #constellation-container { opacity: 0.6; }

        /* The Animation Fix is Here */
        .constellation-line {
            fill: none; stroke: rgba(255, 200, 100, 0.4); stroke-width: 1.5;
            stroke-dasharray: 100; stroke-dashoffset: 100;
            transition: stroke-dashoffset 4s cubic-bezier(0.25, 0.8, 0.25, 1) 1s;
        }
        body.released .constellation-line { stroke-dashoffset: 0; }

        .constellation-star {
            fill: #ffdf73; filter: drop-shadow(0 0 5px #ffdf73);
            opacity: 0; transition: opacity 1s ease;
        }
        
        /* Stars fade in progressively as the line connects them */
        body.released .star-1 { opacity: 1; transition-delay: 1.0s; }
        body.released .star-2 { opacity: 1; transition-delay: 1.6s; }
        body.released .star-3 { opacity: 1; transition-delay: 2.2s; }
        body.released .star-6 { opacity: 1; transition-delay: 2.8s; } /* Center Dip */
        body.released .star-4 { opacity: 1; transition-delay: 3.4s; }
        body.released .star-5 { opacity: 1; transition-delay: 4.0s; }

        /* --- THE MESSAGE --- */
        #message-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            width: 85%; max-width: 400px; text-align: center; z-index: 10;
            opacity: 0; pointer-events: none; 
            transition: opacity 3s ease 2s, transform 3s ease 2s;
        }
        body.released #message-container {
            opacity: 1; transform: translate(-50%, -50%); pointer-events: auto;
        }

        .message-title {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 8vw, 2.5rem);
            color: #ffdf73; font-style: italic; margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 223, 115, 0.4);
        }
        .message-body {
            font-size: clamp(0.9rem, 4.5vw, 1.05rem); line-height: 1.8; color: #d0d0d0;
            font-weight: 300; letter-spacing: 0.5px;
        }

        /* --- THE SKY LANTERN --- */
        #lantern-container {
            position: absolute; 
            bottom: max(10vh, calc(40px + env(safe-area-inset-bottom))); 
            left: 50%; transform: translateX(-50%);
            width: 80px; height: 110px; z-index: 20;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; touch-action: none;
            animation: floatLantern 4s ease-in-out infinite;
        }

        .lantern-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 140, 50, 0.6) 0%, rgba(255, 80, 20, 0.2) 40%, transparent 70%);
            pointer-events: none; z-index: -1;
            animation: pulseGlow 3s infinite alternate;
        }

        .lantern-body {
            width: 60px; height: 80px;
            background: linear-gradient(180deg, #ffb347 0%, #ff7b00 100%);
            border-radius: 40% 40% 30% 30% / 20% 20% 10% 10%;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), inset 5px 0 15px rgba(255,255,255,0.4), 0 10px 20px rgba(255, 100, 0, 0.4);
            position: relative; overflow: hidden;
        }
        
        .lantern-body::before, .lantern-body::after {
            content: ''; position: absolute; top: 0; width: 1px; height: 100%;
            background: rgba(150, 50, 0, 0.4);
        }
        .lantern-body::before { left: 30%; }
        .lantern-body::after { right: 30%; }
        
        .lantern-base {
            width: 40px; height: 6px; background: #3a2010;
            border-radius: 2px; margin-top: -2px; z-index: 2;
        }

        #swipe-hint {
            position: absolute; bottom: -40px; width: 200px; text-align: center;
            font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 3px;
            text-transform: uppercase; color: rgba(255, 200, 100, 0.6); font-weight: 400;
            animation: slideUpHint 2s infinite ease-in-out; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* --- ANIMATIONS --- */
        @keyframes floatLantern { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-15px); } }
        @keyframes pulseGlow { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }
        @keyframes slideUpHint { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-8px); opacity: 0.8; } }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <svg id="constellation-container" viewBox="0 0 200 150">
        <path class="constellation-line" pathLength="100" d="M 100 120 L 50 60 L 70 30 L 100 50 L 130 30 L 150 60 L 100 120" />
        
        <circle class="constellation-star star-1" cx="100" cy="120" r="3.5" />
        <circle class="constellation-star star-2" cx="50" cy="60" r="2.5" />
        <circle class="constellation-star star-3" cx="70" cy="30" r="2.5" />
        <circle class="constellation-star star-6" cx="100" cy="50" r="2" /> <circle class="constellation-star star-4" cx="130" cy="30" r="2.5" />
        <circle class="constellation-star star-5" cx="150" cy="60" r="2.5" />
    </svg>

    <div id="message-container">
        <h1 class="message-title">I'm sorry.</h1>
        <div style="width: 30px; height: 1px; background: rgba(255, 200, 100, 0.5); margin: 0 auto 20px auto;"></div>
        <p class="message-body">
            I know you need space right now, and I am going to respect that boundary.<br><br>
            I just wanted to say that I messed up, and I am deeply sorry.<br><br>
            I'm still down here, sending you all my light until you're ready. No reply expected.
        </p>
    </div>

    <div id="lantern-container">
        <div class="lantern-glow"></div>
        <div class="lantern-body"></div>
        <div class="lantern-base"></div>
        <div id="swipe-hint">Swipe up to release ⟶</div>
    </div>

    <script>
        // ==========================================
        // 1. STARRY NIGHT CANVAS 
        // ==========================================
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let cw = canvas.width = window.innerWidth;
        let ch = canvas.height = window.innerHeight;
        let stars = [];

        window.addEventListener('resize', () => {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        });

        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * cw,
                y: Math.random() * ch,
                r: Math.random() * 1.5,
                alpha: Math.random(),
                twinkleSpeed: Math.random() * 0.02 + 0.005
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, cw, ch);
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.alpha += s.twinkleSpeed;
                if (s.alpha > 1 || s.alpha < 0.1) s.twinkleSpeed = -s.twinkleSpeed;

                ctx.globalAlpha = s.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ==========================================
        // 2. ANDROID-PROOF SWIPE PHYSICS
        // ==========================================
        const lantern = document.getElementById('lantern-container');
        const hint = document.getElementById('swipe-hint');
        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        let isReleased = false;

        function startSwipe(e) {
            if (isReleased) return;
            if (e.cancelable) e.preventDefault();
            
            isDragging = true;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            
            lantern.style.animation = 'none';
            lantern.style.transition = 'none';
            hint.style.opacity = '0';
        }

        function dragSwipe(e) {
            if (!isDragging || isReleased) return;
            if (e.cancelable) e.preventDefault(); 
            
            currentY = e.touches ? e.touches[0].clientY : e.clientY;
            let diffY = currentY - startY;

            if (diffY > 20) diffY = 20; 
            
            lantern.style.transform = `translateX(-50%) translateY(${diffY}px)`;
        }

        function endSwipe() {
            if (!isDragging || isReleased) return;
            isDragging = false;
            let diffY = currentY - startY;

            if (diffY < -60) {
                triggerRelease();
            } else {
                lantern.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
                lantern.style.transform = `translateX(-50%) translateY(0)`;
                hint.style.opacity = '1';
                
                setTimeout(() => {
                    if(!isReleased) lantern.style.animation = 'floatLantern 4s ease-in-out infinite';
                }, 500);
            }
        }

        function triggerRelease() {
            isReleased = true;
            document.body.classList.add('released');
            
            if (navigator.vibrate) navigator.vibrate([30, 60, 30]);

            lantern.style.transition = 'transform 5s cubic-bezier(0.4, 0, 0.2, 1), opacity 5s ease-in';
            lantern.style.transform = `translateX(-50%) translateY(-120vh) scale(0.3)`;
            lantern.style.opacity = '0';

            setTimeout(() => {
                lantern.style.display = 'none';
            }, 5000);
        }

        lantern.addEventListener('touchstart', startSwipe, {passive: false});
        lantern.addEventListener('mousedown', startSwipe);
        window.addEventListener('touchmove', dragSwipe, {passive: false});
        window.addEventListener('mousemove', dragSwipe);
        window.addEventListener('touchend', endSwipe);
        window.addEventListener('mouseup', endSwipe);
        window.addEventListener('touchcancel', endSwipe);
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
