<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Morning!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1a2e; /* Fallback */
        }

        /* The Day Background */
        .day-sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ff7e5f, #feb47b);
            z-index: 0;
        }

        /* The Night Background */
        .night-sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b1a2e, #1a365d);
            z-index: 1;
            transition: opacity 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Stars */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* The Sun */
        .sun {
            position: absolute;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff3a1 0%, #ffc107 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffc107, 0 0 100px #ff9800;
            z-index: 2;
            transition: bottom 4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* The Message */
        .message-container {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 3;
            opacity: 0;
            transition: opacity 2s ease 3s; /* Delays fade-in until sun is up */
            width: 90%;
            pointer-events: none;
        }

        h1 {
            color: #fff;
            font-size: 2.8rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        p {
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
            font-weight: 300;
        }

        /* Interactive Button */
        .start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            z-index: 4;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -52%);
        }

        .start-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Interactive Hearts */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff4b72;
            transform: rotate(-45deg);
            animation: floatUp 1.5s ease-out forwards;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 75, 114, 0.5);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff4b72;
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 10px;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: rotate(-45deg) scale(0.5) translateY(0);
            }
            100% {
                opacity: 0;
                transform: rotate(-45deg) scale(1.5) translateY(-100px);
            }
        }
    </style>
</head>
<body>

    <!-- Sunrise Gradient Layer -->
    <div class="day-sky"></div>

    <!-- Night Gradient Layer -->
    <div class="night-sky" id="nightSky">
        <!-- Stars injected by JS -->
    </div>

    <!-- The Sun -->
    <div class="sun" id="sun"></div>

    <!-- The Greeting Message -->
    <div class="message-container" id="message">
        <h1>Good Morning, Beautiful! ☀️</h1>
        <p>Wishing you a day as wonderful and bright as your smile.</p>
    </div>

    <!-- Start Interaction -->
    <button class="start-btn" id="startBtn">Wake up the Sun ✨</button>

    <script>
        const nightSky = document.getElementById('nightSky');
        const sun = document.getElementById('sun');
        const startBtn = document.getElementById('startBtn');
        const message = document.getElementById('message');
        let isAwake = false;

        // Generate Random Stars for the night sky
        function createStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Randomize position and size
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 2 + 1;
                const duration = Math.random() * 3 + 2;

                star.style.left = x + '%';
                star.style.top = y + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDuration = duration + 's';

                nightSky.appendChild(star);
            }
        }
        createStars();

        // Trigger Sunrise
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent creating a heart on the button click
            isAwake = true;
            
            // Hide button
            startBtn.classList.add('hidden');
            
            // Fade out night sky
            nightSky.style.opacity = '0';
            
            // Animate Sun up
            // On smaller screens, go a bit higher so it's centered nicely below text
            const isMobile = window.innerWidth < 600;
            sun.style.bottom = isMobile ? '40%' : '35%';
            
            // Show Message
            message.style.opacity = '1';
        });

        // Interactive Hearts on Click/Tap
        document.addEventListener('pointerdown', (e) => {
            if (!isAwake) return; // Only allow hearts after sunrise

            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Offset slightly to center the heart on the cursor
            heart.style.left = (e.clientX - 10) + 'px';
            heart.style.top = (e.clientY - 10) + 'px';
            
            document.body.appendChild(heart);

            // Clean up the DOM after animation ends
            setTimeout(() => {
                heart.remove();
            }, 1500);
        });
    </script>
</body>
</html>
